<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encendido Oeste – Tienda Oficial</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --amarillo: #FFE600; --negro: #0a0a0a; --gris-oscuro: #141414;
      --gris-medio: #1f1f1f; --gris-borde: #2e2e2e; --blanco: #f5f5f5;
      --accent: #FF4500; --verde: #00c851;
    }
    body { background: var(--negro); color: var(--blanco); font-family: 'Barlow', sans-serif; min-height: 100vh; }
    header {
      background: var(--amarillo); padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(255,230,0,.3);
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--negro); letter-spacing: 2px; }
    .logo span { color: var(--accent); }
    .ml-badge {
      display: flex; align-items: center; gap: .5rem;
      background: var(--negro); color: var(--amarillo);
      font-size: .75rem; font-weight: 700; padding: .4rem .9rem;
      border-radius: 20px; letter-spacing: 1px;
    }
    .ml-badge::before {
      content: ''; width: 8px; height: 8px;
      background: var(--verde); border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);} }
    .hero {
      background: linear-gradient(135deg, var(--gris-oscuro) 60%, #1a1500 100%);
      border-bottom: 3px solid var(--amarillo); padding: 2.5rem 2rem 2rem;
    }
    .hero h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,6vw,4.5rem); color:var(--amarillo); letter-spacing:3px; line-height:1; }
    .hero p { color:#aaa; font-size:.95rem; margin-top:.5rem; font-weight:300; }
    #total-badge {
      background:var(--amarillo); color:var(--negro);
      font-weight:700; font-size:.8rem;
      padding:.25rem .7rem; border-radius:4px; margin-top:.6rem; display:inline-block;
    }
    .filtros {
      padding:1rem 2rem; display:flex; gap:.75rem; flex-wrap:wrap; align-items:center;
      border-bottom:1px solid var(--gris-borde); background:var(--gris-oscuro);
    }
    .filtros label { font-size:.8rem; color:#888; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
    #busqueda {
      flex:1; min-width:200px; background:var(--gris-medio); border:1px solid var(--gris-borde);
      color:var(--blanco); padding:.5rem 1rem; border-radius:6px;
      font-family:'Barlow',sans-serif; font-size:.9rem; outline:none; transition:border-color .2s;
    }
    #busqueda:focus { border-color:var(--amarillo); }
    #busqueda::placeholder { color:#555; }
    select#orden {
      background:var(--gris-medio); border:1px solid var(--gris-borde);
      color:var(--blanco); padding:.5rem 1rem; border-radius:6px;
      font-family:'Barlow',sans-serif; font-size:.9rem; cursor:pointer; outline:none;
    }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.25rem; padding:2rem; }
    .card {
      background:var(--gris-medio); border:1px solid var(--gris-borde);
      border-radius:10px; overflow:hidden; display:flex; flex-direction:column;
      transition:transform .25s,border-color .25s,box-shadow .25s;
      text-decoration:none; color:inherit; animation:fadeUp .4s ease both;
    }
    .card:hover { transform:translateY(-5px); border-color:var(--amarillo); box-shadow:0 8px 32px rgba(255,230,0,.12); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
    .card-img { width:100%; aspect-ratio:1/1; object-fit:contain; background:#fff; padding:1rem; border-bottom:1px solid var(--gris-borde); }
    .card-body { padding:1rem; display:flex; flex-direction:column; gap:.4rem; flex:1; }
    .card-title { font-size:.85rem; font-weight:400; color:#ccc; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-price { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--amarillo); letter-spacing:1px; }
    .card-original { font-size:.78rem; color:#666; text-decoration:line-through; }
    .card-descuento { font-size:.75rem; font-weight:700; color:var(--verde); }
    .card-envio { font-size:.72rem; color:var(--verde); margin-top:auto; padding-top:.4rem; }
    .card-btn { display:block; text-align:center; background:var(--amarillo); color:var(--negro); font-weight:700; font-size:.82rem; padding:.55rem; text-decoration:none; letter-spacing:.5px; transition:background .2s; }
    .card-btn:hover { background:#ffd000; }
    .estado { text-align:center; padding:5rem 2rem; color:#555; }
    .estado .ico { font-size:3rem; margin-bottom:1rem; }
    .estado p { font-size:1.1rem; }
    .spinner { width:48px; height:48px; border:4px solid var(--gris-borde); border-top-color:var(--amarillo); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 1.5rem; }
    @keyframes spin { to{transform:rotate(360deg);} }
    footer { text-align:center; padding:2rem; color:#444; font-size:.78rem; border-top:1px solid var(--gris-borde); }
    footer a { color:var(--amarillo); text-decoration:none; }
  </style>
</head>
<body>

<header>
  <div class="logo">Encendido <span>Oeste</span></div>
  <div class="ml-badge">EN VIVO · MERCADOLIBRE</div>
</header>

<section class="hero">
  <div>
    <h1>Tienda Oficial</h1>
    <p>Productos actualizados en tiempo real desde MercadoLibre Argentina</p>
    <div id="total-badge">Cargando productos…</div>
  </div>
</section>

<div class="filtros">
  <label>Buscar:</label>
  <input type="text" id="busqueda" placeholder="Buscar producto…"/>
  <label>Ordenar:</label>
  <select id="orden">
    <option value="">Relevancia</option>
    <option value="price_asc">Precio: menor a mayor</option>
    <option value="price_desc">Precio: mayor a menor</option>
    <option value="name_asc">Nombre A–Z</option>
  </select>
</div>

<main id="contenedor">
  <div class="estado">
    <div class="spinner"></div>
    <p>Conectando con MercadoLibre…</p>
  </div>
</main>

<footer>
  Datos obtenidos en tiempo real desde
  <a href="https://www.mercadolibre.com.ar/tienda/eo-encendido-oeste" target="_blank">
    MercadoLibre · Encendido Oeste
  </a>
  · Se actualiza cada vez que abrís la página
</footer>

<script>
  let allProducts = [];

  function formatPrecio(n) {
    return new Intl.NumberFormat('es-AR', {
      style: 'currency', currency: 'ARS', maximumFractionDigits: 0
    }).format(n);
  }

  async function fetchProductos() {
    // Llama al backend propio (sin problemas de CORS)
    const res = await fetch('/api/productos');
    if (!res.ok) throw new Error('Error del servidor');
    return res.json();
  }

  function renderCards(productos) {
    const cont = document.getElementById('contenedor');
    if (!productos.length) {
      cont.innerHTML = `<div class="estado"><div class="ico">🔍</div><p>No se encontraron productos.</p></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    productos.forEach((p, i) => {
      const descuento = p.original_price && p.original_price > p.price
        ? Math.round((1 - p.price / p.original_price) * 100) : null;
      const envioGratis = p.shipping?.free_shipping;
      const img = p.thumbnail?.replace('http:', 'https:').replace('-I.jpg', '-O.jpg') || '';
      const card = document.createElement('a');
      card.className = 'card';
      card.href = p.permalink;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = `${i * 25}ms`;
      card.innerHTML = `
        ${img ? `<img class="card-img" src="${img}" alt="${p.title}" loading="lazy" onerror="this.style.display='none'"/>` : ''}
        <div class="card-body">
          <div class="card-title">${p.title}</div>
          <div class="card-price">${formatPrecio(p.price)}</div>
          ${descuento ? `<div class="card-original">${formatPrecio(p.original_price)}</div><div class="card-descuento">▼ ${descuento}% OFF</div>` : ''}
          ${envioGratis ? `<div class="card-envio">✓ Envío gratis</div>` : ''}
        </div>
        <span class="card-btn">Ver en MercadoLibre →</span>`;
      grid.appendChild(card);
    });
    cont.innerHTML = '';
    cont.appendChild(grid);
  }

  function filtrarYOrdenar() {
    const texto = document.getElementById('busqueda').value.toLowerCase();
    const orden = document.getElementById('orden').value;
    let lista = allProducts.filter(p => p.title.toLowerCase().includes(texto));
    if (orden === 'price_asc') lista.sort((a,b) => a.price - b.price);
    else if (orden === 'price_desc') lista.sort((a,b) => b.price - a.price);
    else if (orden === 'name_asc') lista.sort((a,b) => a.title.localeCompare(b.title));
    renderCards(lista);
  }

  async function init() {
    try {
      const productos = await fetchProductos();
      allProducts = productos;
      document.getElementById('total-badge').textContent = `${productos.length} productos disponibles`;
      renderCards(productos);
      document.getElementById('busqueda').addEventListener('input', filtrarYOrdenar);
      document.getElementById('orden').addEventListener('change', filtrarYOrdenar);
    } catch(e) {
      document.getElementById('total-badge').textContent = 'Error';
      document.getElementById('contenedor').innerHTML = `
        <div class="estado"><div class="ico">⚠️</div><p>No se pudieron cargar los productos.<br>Verificá que el servidor esté corriendo.</p></div>`;
    }
  }

  init();
</script>
</body>
</html>
